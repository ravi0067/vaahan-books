name: Build and Release Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      # 🔥 VERY IMPORTANT
      - name: Rebuild Native Modules
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Build App
        run: npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: VaahanBooks-Setup
          path: release/*.exe
