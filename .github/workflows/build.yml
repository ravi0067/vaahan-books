name: Build and Release Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ FIXED
      - name: Install Dependencies
        run: npm install

      # ✅ FIXED
      - name: Rebuild Native Modules
        run: npx @electron/rebuild -v 34.3.0 -f -w better-sqlite3

      - name: Build App
        run: npm run build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: VaahanBooks-Setup
          path: release/*.exe
